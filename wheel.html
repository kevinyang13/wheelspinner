<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wheel Spinner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 20px;
      letter-spacing: 1px;
      color: #f0c040;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .tab-btn {
      padding: 9px 28px;
      border: 2px solid #f0c040;
      background: transparent;
      color: #f0c040;
      border-radius: 24px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .tab-btn.active { background: #f0c040; color: #1a1a2e; font-weight: bold; }

    /* ── Two-column layout ── */
    .app-layout {
      display: flex;
      flex-direction: row;
      gap: 32px;
      align-items: flex-start;
      width: 100%;
      max-width: 960px;
    }

    .main-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 0 0 auto;
    }

    /* ── Wheel area ── */
    .wheel-area {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 3-D pin pointer */
    .pointer {
      width: 28px;
      height: 44px;
      margin-bottom: -6px;
      z-index: 10;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6));
    }

    canvas { display: block; }

    /* ── Spin button ── */
    .spin-btn {
      margin-top: 24px;
      padding: 13px 52px;
      font-size: 1.25rem;
      font-weight: bold;
      border: none;
      border-radius: 32px;
      background: linear-gradient(135deg, #f0c040, #ff6b35);
      color: #1a1a2e;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(240,192,64,0.45);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .spin-btn:hover { transform: scale(1.04); }
    .spin-btn:active { transform: scale(0.97); }
    .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .reload-btn {
      width: 50px; height: 50px;
      border-radius: 50%;
      border: 2px solid #f0c040;
      background: transparent;
      color: #f0c040;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.4s ease, background 0.2s;
    }
    .reload-btn:hover { background: rgba(240,192,64,0.12); }
    .reload-btn:active { transform: rotate(360deg); }
    .reload-btn.spinning { transform: rotate(360deg); transition: transform 0.5s ease; }

    #result {
      margin-top: 16px;
      font-size: 1.6rem;
      font-weight: bold;
      min-height: 2.2rem;
      color: #f0c040;
      text-align: center;
      text-shadow: 0 2px 8px rgba(240,192,64,0.5);
    }

    /* ── Slider ── */
    .count-control {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
      font-size: 0.9rem;
      color: #ccc;
    }
    .count-control input[type=range] { width: 160px; accent-color: #f0c040; }
    #count-label { font-weight: bold; color: #f0c040; min-width: 24px; text-align: center; }

    /* ── Entry editor ── */
    .entries-panel { margin-top: 20px; width: 100%; max-width: 440px; }
    .entries-panel h2 {
      font-size: 0.85rem; color: #aaa; margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .entry-list {
      display: flex; flex-direction: column; gap: 5px;
      max-height: 220px; overflow-y: auto; padding-right: 4px;
    }
    .entry-row { display: flex; align-items: center; gap: 8px; }
    .entry-row input {
      flex: 1; padding: 6px 10px; border-radius: 8px;
      border: 1px solid #444; background: #16213e; color: #eee; font-size: 0.9rem;
    }
    .entry-row button {
      background: transparent; border: none; color: #ff4757;
      font-size: 1.1rem; cursor: pointer; padding: 3px 6px; line-height: 1;
    }
    .add-btn {
      margin-top: 8px; padding: 7px 16px; border-radius: 8px;
      border: 1px dashed #f0c040; background: transparent;
      color: #f0c040; cursor: pointer; font-size: 0.85rem;
    }
    .add-btn:hover { background: rgba(240,192,64,0.1); }

    /* ── History sidebar ── */
    .history-panel {
      flex: 1;
      min-width: 240px;
      max-width: 300px;
      position: sticky;
      top: 24px;
      max-height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
      background: #16213e;
      border-radius: 16px;
      padding: 16px;
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .history-header h2 {
      font-size: 0.85rem; color: #aaa;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .clear-btn {
      background: transparent; border: 1px solid #444; color: #777;
      font-size: 0.75rem; padding: 3px 9px; border-radius: 6px; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .clear-btn:hover { border-color: #ff4757; color: #ff4757; }

    .history-list {
      display: flex; flex-direction: column; gap: 6px;
      overflow-y: auto; flex: 1;
    }

    .history-item {
      display: flex; align-items: center; gap: 8px;
      background: #0f172a; border-radius: 10px; padding: 9px 12px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .history-num { font-size: 0.7rem; color: #444; min-width: 18px; text-align: right; }
    .history-person {
      font-size: 0.7rem; font-weight: bold; padding: 2px 7px;
      border-radius: 10px; background: #f0c040; color: #1a1a2e; white-space: nowrap;
    }
    .history-person.lindsey { background: #22A6B3; color: #fff; }
    .history-value { flex: 1; font-size: 0.9rem; font-weight: bold; color: #eee; }
    .history-time { font-size: 0.7rem; color: #555; white-space: nowrap; }
    .history-empty { color: #444; font-size: 0.85rem; text-align: center; padding: 24px 0; }
  </style>
</head>
<body>
  <nav style="width:100%;max-width:960px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <a href="index.html" style="color:#f0c040;text-decoration:none;font-size:0.9rem;opacity:0.8;">← Home</a>
  </nav>
  <h1>🎡 Wheel Spinner</h1>

  <div class="tabs">
    <button class="tab-btn active" data-person="Kyle">Kyle</button>
    <button class="tab-btn" data-person="Lindsey">Lindsey</button>
  </div>

  <div class="app-layout">
    <!-- Left: wheel + controls -->
    <div class="main-col">
      <div class="wheel-area">
        <!-- SVG 3D-style pin pointer -->
        <svg class="pointer" viewBox="0 0 28 44" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="pinGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="#ff6b6b"/>
              <stop offset="40%"  stop-color="#ff4757"/>
              <stop offset="100%" stop-color="#c0392b"/>
            </linearGradient>
            <linearGradient id="pinShine" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"  stop-color="rgba(255,255,255,0.4)"/>
              <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
            </linearGradient>
          </defs>
          <!-- Main body -->
          <path d="M14 44 L2 10 Q14 0 26 10 Z" fill="url(#pinGrad)"/>
          <!-- Shine -->
          <path d="M14 44 L2 10 Q8 4 14 4 Z" fill="url(#pinShine)"/>
          <!-- Tip highlight -->
          <ellipse cx="14" cy="10" rx="6" ry="4" fill="rgba(255,255,255,0.2)"/>
        </svg>
        <canvas id="wheel" width="420" height="420"></canvas>
      </div>

      <div style="display:flex;gap:12px;align-items:center;margin-top:24px;">
        <button class="spin-btn" id="spinBtn" style="margin-top:0;">SPIN</button>
        <button class="reload-btn" id="reloadBtn" title="Randomize wheel">&#x21BB;</button>
      </div>
      <div id="result"></div>

      <div class="count-control">
        <span>Entries on wheel:</span>
        <input type="range" id="countSlider" min="5" max="20" value="8" step="1" />
        <span id="count-label">8</span>
      </div>

      <div class="entries-panel">
        <h2>Edit Entries</h2>
        <div class="entry-list" id="entryList"></div>
        <button class="add-btn" id="addBtn">+ Add entry</button>
      </div>
    </div>

    <!-- Right: history sidebar -->
    <div class="history-panel">
      <div class="history-header">
        <h2>Spin History</h2>
        <button class="clear-btn" id="clearHistoryBtn">Clear all</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <script>
    const DEFAULT_ENTRIES = {
      Kyle:    ['Math', 'Chinese', 'Piano', 'Adobe', 'TV', 'Game', 'Sport', 'CleanRoom',
                'Flute', 'Sleep', 'Shower', 'Garden', 'Chromebook', 'Reading', 'Writing', 'Board Game', 'Upside Down'],
      Lindsey: ['Math', 'Chinese', 'Piano', 'Adobe', 'TV', 'Game', 'Sport', 'CleanRoom',
                'Singing', 'Sleep', 'Shower', 'Garden', 'iPad', 'Reading', 'Writing', 'Board Game', 'Upside Down'],
    };

    const PALETTE = [
      '#FF6B6B','#FF9F43','#F9CA24','#6AB04C','#22A6B3',
      '#4834D4','#BE2EDD','#E84393','#C0392B','#C4E538',
      '#EE5A24','#27AE60','#2980B9','#9980FA','#FFC312',
      '#12CBC4','#ED4C67','#B53471','#5758BB','#1289A7',
    ];

    // ── Color helpers ──────────────────────────────────
    function hexToRgb(hex) {
      return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
    }
    function lighten(hex, amt) {
      const [r,g,b] = hexToRgb(hex);
      return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
    }
    function darken(hex, amt) {
      const [r,g,b] = hexToRgb(hex);
      return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
    }

    // ── State ──────────────────────────────────────────
    let currentPerson = 'Kyle';
    let entries = JSON.parse(localStorage.getItem('ws_entries') || 'null') || {
      Kyle: [...DEFAULT_ENTRIES.Kyle],
      Lindsey: [...DEFAULT_ENTRIES.Lindsey],
    };
    // Merge any new default entries not already saved
    ['Kyle', 'Lindsey'].forEach(p => {
      DEFAULT_ENTRIES[p].forEach(e => {
        if (!entries[p].includes(e)) entries[p].push(e);
      });
    });
    let displayCount = parseInt(localStorage.getItem('ws_count') || '8');
    let spinning = false;
    let currentAngle = 0;
    let history = JSON.parse(localStorage.getItem('ws_history') || '[]');

    // ── Canvas setup ───────────────────────────────────
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');

    (function scaleCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const size = 420;
      canvas.style.width  = size + 'px';
      canvas.style.height = size + 'px';
      canvas.width  = size * dpr;
      canvas.height = size * dpr;
      ctx.scale(dpr, dpr);
    })();

    const spinBtn   = document.getElementById('spinBtn');
    const resultEl  = document.getElementById('result');
    const slider    = document.getElementById('countSlider');
    const countLabel= document.getElementById('count-label');
    const entryList = document.getElementById('entryList');
    const addBtn    = document.getElementById('addBtn');

    // ── Persistence ────────────────────────────────────
    function saveData() {
      localStorage.setItem('ws_entries', JSON.stringify(entries));
      localStorage.setItem('ws_count',   displayCount);
      localStorage.setItem('ws_history', JSON.stringify(history));
    }

    // ── History render ─────────────────────────────────
    function renderHistory() {
      const el = document.getElementById('historyList');
      if (!history.length) {
        el.innerHTML = '<div class="history-empty">No spins yet</div>';
        return;
      }
      el.innerHTML = '';
      [...history].reverse().forEach((item, i) => {
        const row = document.createElement('div');
        row.className = 'history-item';
        row.innerHTML = `
          <span class="history-num">${history.length - i}</span>
          <span class="history-person ${item.person === 'Lindsey' ? 'lindsey' : ''}">${item.person}</span>
          <span class="history-value">${item.value}</span>
          <span class="history-time">${item.time}</span>
        `;
        el.appendChild(row);
      });
    }

    // ── Active entries ─────────────────────────────────
    function getActiveEntries() {
      return entries[currentPerson].slice(0, displayCount);
    }

    // ── 3D Wheel draw ──────────────────────────────────
    function drawWheel(angle) {
      const items = getActiveEntries();
      const n = items.length;
      const SIZE  = 420;
      const cx    = SIZE / 2;
      const cy    = SIZE / 2;
      const rimW  = 20;
      const rimR  = cx - 4;   // outer rim radius
      const r     = rimR - rimW; // segment face radius
      const arc   = (2 * Math.PI) / n;

      ctx.clearRect(0, 0, SIZE, SIZE);

      // 1. Cast shadow (ellipse on "floor")
      const shadowGrad = ctx.createRadialGradient(cx+8, cy+rimR*0.18, rimR*0.2, cx+8, cy+rimR*0.18, rimR*1.1);
      shadowGrad.addColorStop(0, 'rgba(0,0,0,0.5)');
      shadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.save();
      ctx.beginPath();
      ctx.ellipse(cx+8, cy + rimR*0.14, rimR*1.02, rimR*0.22, 0, 0, 2*Math.PI);
      ctx.fillStyle = shadowGrad;
      ctx.fill();
      ctx.restore();

      // 2. Outer metallic rim
      const rimGrad = ctx.createRadialGradient(cx - rimR*0.45, cy - rimR*0.45, rimR*0.1, cx, cy, rimR);
      rimGrad.addColorStop(0,   '#e8e8e8');
      rimGrad.addColorStop(0.25,'#b0b0b0');
      rimGrad.addColorStop(0.55,'#606060');
      rimGrad.addColorStop(0.8, '#303030');
      rimGrad.addColorStop(1,   '#181818');
      ctx.beginPath();
      ctx.arc(cx, cy, rimR, 0, 2*Math.PI);
      ctx.fillStyle = rimGrad;
      ctx.fill();

      // Rim highlight arc (top-left)
      ctx.beginPath();
      ctx.arc(cx, cy, rimR - 3, -Math.PI*0.85, -Math.PI*0.05);
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 2.5;
      ctx.stroke();

      // Rim shadow arc (bottom-right)
      ctx.beginPath();
      ctx.arc(cx, cy, rimR - 3, Math.PI*0.1, Math.PI*0.95);
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.lineWidth = 3;
      ctx.stroke();

      // 3. Decorative studs on rim
      const studCount = Math.max(16, n * 2);
      for (let i = 0; i < studCount; i++) {
        const sa = angle + (i / studCount) * 2 * Math.PI;
        const sr = rimR - rimW / 2;
        const sx = cx + Math.cos(sa) * sr;
        const sy = cy + Math.sin(sa) * sr;

        ctx.beginPath();
        ctx.arc(sx, sy, 4.5, 0, 2*Math.PI);
        const sg = ctx.createRadialGradient(sx-1.5, sy-1.5, 0.5, sx, sy, 4.5);
        sg.addColorStop(0,   '#ffffff');
        sg.addColorStop(0.35,'#cccccc');
        sg.addColorStop(1,   '#505050');
        ctx.fillStyle = sg;
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.45)';
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }

      // 4. Segment face with radial gradient shading
      for (let i = 0; i < n; i++) {
        const start = angle + i * arc;
        const end   = start + arc;
        const color = PALETTE[i % PALETTE.length];

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, start, end);
        ctx.closePath();

        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
        grad.addColorStop(0,    lighten(color, 60));
        grad.addColorStop(0.3,  lighten(color, 25));
        grad.addColorStop(0.7,  color);
        grad.addColorStop(1,    darken(color, 30));
        ctx.fillStyle = grad;
        ctx.fill();
      }

      // 5. Beveled segment dividers
      for (let i = 0; i < n; i++) {
        const la = angle + i * arc;
        // Light edge
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(la)*r, cy + Math.sin(la)*r);
        ctx.strokeStyle = 'rgba(255,255,255,0.55)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Shadow edge (tiny offset)
        const off = 0.01;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(la+off)*r, cy + Math.sin(la+off)*r);
        ctx.strokeStyle = 'rgba(0,0,0,0.4)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }

      // 6. Labels
      const fontSize = n > 14 ? 11 : n > 10 ? 13 : 15;
      for (let i = 0; i < n; i++) {
        const mid = angle + i * arc + arc / 2;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(mid);
        ctx.textAlign    = 'right';
        ctx.font         = `bold ${fontSize}px system-ui, sans-serif`;
        ctx.shadowColor  = 'rgba(0,0,0,0.9)';
        ctx.shadowBlur   = 5;
        ctx.shadowOffsetX = 1;
        ctx.shadowOffsetY = 1;
        ctx.fillStyle    = '#fff';
        ctx.fillText(items[i], r - 14, 5);
        ctx.restore();
      }

      // 7. Glossy overlay
      const gloss = ctx.createRadialGradient(cx - r*0.28, cy - r*0.38, 0, cx, cy, r);
      gloss.addColorStop(0,    'rgba(255,255,255,0.24)');
      gloss.addColorStop(0.45, 'rgba(255,255,255,0.06)');
      gloss.addColorStop(1,    'rgba(0,0,0,0.14)');
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, 2*Math.PI);
      ctx.fillStyle = gloss;
      ctx.fill();

      // Thin inner edge ring
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, 2*Math.PI);
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // 8. 3D metallic center hub
      const hubR = 32;

      ctx.save();
      ctx.shadowColor  = 'rgba(0,0,0,0.7)';
      ctx.shadowBlur   = 14;
      ctx.shadowOffsetY = 6;
      ctx.beginPath();
      ctx.arc(cx, cy, hubR, 0, 2*Math.PI);
      ctx.fillStyle = '#888';
      ctx.fill();
      ctx.restore();

      const hubGrad = ctx.createRadialGradient(cx-10, cy-10, 2, cx, cy, hubR);
      hubGrad.addColorStop(0,   '#ffffff');
      hubGrad.addColorStop(0.2, '#e8e8e8');
      hubGrad.addColorStop(0.5, '#b0b0b0');
      hubGrad.addColorStop(0.8, '#686868');
      hubGrad.addColorStop(1,   '#303030');
      ctx.beginPath();
      ctx.arc(cx, cy, hubR, 0, 2*Math.PI);
      ctx.fillStyle = hubGrad;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(cx, cy, hubR, 0, 2*Math.PI);
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Inner pin
      ctx.beginPath();
      ctx.arc(cx, cy, 9, 0, 2*Math.PI);
      ctx.fillStyle = '#1a1a2e';
      ctx.fill();

      // Pin shine
      ctx.beginPath();
      ctx.arc(cx-3, cy-3, 3.5, 0, 2*Math.PI);
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fill();
    }

    // ── Winner detection ───────────────────────────────
    function getWinner(finalAngle) {
      const items = getActiveEntries();
      const n = items.length;
      const arc = (2 * Math.PI) / n;
      const norm = ((-finalAngle - Math.PI / 2) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
      return items[Math.floor(norm / arc) % n];
    }

    // ── Spin ───────────────────────────────────────────
    function spin() {
      if (spinning) return;
      spinning = true;
      spinBtn.disabled = true;
      resultEl.textContent = '';

      const extraSpins  = 8 + Math.floor(Math.random() * 6);
      const extraAngle  = Math.random() * 2 * Math.PI;
      const totalDelta  = extraSpins * 2 * Math.PI + extraAngle;
      const targetAngle = currentAngle + totalDelta;
      const duration    = 4000 + Math.random() * 1500;
      const startAngle  = currentAngle;
      const startTime   = performance.now();

      function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

      function frame(now) {
        const t = Math.min((now - startTime) / duration, 1);
        currentAngle = startAngle + totalDelta * easeOut(t);
        drawWheel(currentAngle);

        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          currentAngle = targetAngle;
          spinning = false;
          spinBtn.disabled = false;
          const winner = getWinner(currentAngle);
          resultEl.textContent = `🎉 ${winner}!`;
          const d = new Date();
          const time = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
          history.push({ person: currentPerson, value: winner, time });
          saveData();
          renderHistory();
        }
      }

      requestAnimationFrame(frame);
    }

    // ── Entry list render ──────────────────────────────
    function renderEntryList() {
      entryList.innerHTML = '';
      entries[currentPerson].forEach((val, i) => {
        const row   = document.createElement('div');
        row.className = 'entry-row';
        const input = document.createElement('input');
        input.type  = 'text';
        input.value = val;
        input.addEventListener('input', () => {
          entries[currentPerson][i] = input.value;
          saveData();
          drawWheel(currentAngle);
        });
        const del = document.createElement('button');
        del.textContent = '✕';
        del.addEventListener('click', () => {
          entries[currentPerson].splice(i, 1);
          if (displayCount > entries[currentPerson].length) {
            displayCount = entries[currentPerson].length;
            slider.value = displayCount;
            countLabel.textContent = displayCount;
          }
          saveData();
          renderEntryList();
          drawWheel(currentAngle);
        });
        row.appendChild(input);
        row.appendChild(del);
        entryList.appendChild(row);
      });

      slider.max = Math.min(20, entries[currentPerson].length);
      if (displayCount > entries[currentPerson].length) displayCount = entries[currentPerson].length;
      slider.value = displayCount;
      countLabel.textContent = displayCount;
    }

    // ── Event listeners ────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentPerson = btn.dataset.person;
        currentAngle  = 0;
        resultEl.textContent = '';
        renderEntryList();
        drawWheel(currentAngle);
      });
    });

    slider.addEventListener('input', () => {
      displayCount = parseInt(slider.value);
      countLabel.textContent = displayCount;
      saveData();
      drawWheel(currentAngle);
    });

    spinBtn.addEventListener('click', spin);

    document.getElementById('reloadBtn').addEventListener('click', () => {
      const btn = document.getElementById('reloadBtn');
      // Fisher-Yates shuffle on the current person's list
      const list = entries[currentPerson];
      for (let i = list.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [list[i], list[j]] = [list[j], list[i]];
      }
      saveData();
      renderEntryList();
      drawWheel(currentAngle);
      // Spin animation on the button
      btn.classList.remove('spinning');
      void btn.offsetWidth; // reflow to restart animation
      btn.classList.add('spinning');
      setTimeout(() => btn.classList.remove('spinning'), 500);
    });

    addBtn.addEventListener('click', () => {
      entries[currentPerson].push('New entry');
      saveData();
      renderEntryList();
      drawWheel(currentAngle);
      const inputs = entryList.querySelectorAll('input');
      if (inputs.length) { inputs[inputs.length-1].focus(); inputs[inputs.length-1].select(); }
    });

    document.getElementById('clearHistoryBtn').addEventListener('click', () => {
      if (!history.length) return;
      if (confirm('Clear all spin history?')) {
        history = [];
        saveData();
        renderHistory();
      }
    });

    // ── Init ───────────────────────────────────────────
    renderEntryList();
    drawWheel(currentAngle);
    renderHistory();
  </script>
</body>
</html>
